<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <!-- Blue gradient (inspired by your reference) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2b4e" />
      <stop offset="40%" stop-color="#0f3b6f" />
      <stop offset="100%" stop-color="#1e6ad0" />
    </linearGradient>

    <!-- Accent glow gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05" />
    </pattern>

    <!-- Floating code pattern -->
    <pattern id="codeBits" width="80" height="80" patternUnits="userSpaceOnUse">
      <text x="5" y="20" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.1">&lt;/&gt;</text>
      <text x="50" y="60" font-family="monospace" font-size="8" fill="#3b82f6" opacity="0.15">{}</text>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#blueGrad)" />
  <rect width="1280" height="400" fill="url(#grid)" />
  <rect width="1280" height="400" fill="url(#codeBits)" />

  <!-- Floating decorative elements -->
  <text x="80" y="100" font-family="monospace" font-size="64" fill="#ffffff" opacity="0.05" font-weight="bold">&lt;/&gt;</text>
  <text x="1100" y="330" font-family="monospace" font-size="80" fill="#ffffff" opacity="0.04" font-weight="bold">{ }</text>

  <!-- Binary tree icon (bottom left) -->
  <g transform="translate(60, 340)" opacity="0.5">
    <circle cx="0" cy="0" r="4" fill="#00d4ff" filter="url(#glow)" />
    <line x1="0" y1="4" x2="-15" y2="20" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" />
    <line x1="0" y1="4" x2="15" y2="20" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" />
    <circle cx="-15" cy="24" r="3" fill="#3b82f6" opacity="0.8" />
    <circle cx="15" cy="24" r="3" fill="#3b82f6" opacity="0.8" />
  </g>

  <!-- Main title -->
  <text x="640" y="160" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-weight="800" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="1" filter="url(#softGlow)">
    Data Structures &amp; Algorithms
  </text>

  <!-- Neon underline -->
  <rect x="340" y="180" width="600" height="4" rx="2" fill="url(#accentGrad)" filter="url(#glow)" />

  <!-- Subtitle -->
  <text x="640" y="235" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-weight="500" font-size="26" fill="#b8d4ff" text-anchor="middle" letter-spacing="1">
    Problem Solving · Efficient Code · Mastery
  </text>

  <!-- Language badges -->
  <g transform="translate(640, 300)">
    <!-- Java -->
    <g>
      <rect x="-240" y="-24" width="140" height="48" rx="24" fill="#0a2b4e" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
      <text x="-170" y="7" font-family="'Fira Code', monospace" font-weight="bold" font-size="20" fill="#e2e8f0" text-anchor="middle">☕ Java</text>
    </g>

    <!-- C++ -->
    <g>
      <rect x="-80" y="-24" width="140" height="48" rx="24" fill="#0a2b4e" stroke="#00d4ff" stroke-width="2" filter="url(#glow)" />
      <text x="-10" y="7" font-family="'Fira Code', monospace" font-weight="bold" font-size="20" fill="#e2e8f0" text-anchor="middle">⚡ C++</text>
    </g>

    <!-- Python -->
    <g>
      <rect x="80" y="-24" width="150" height="48" rx="24" fill="#0a2b4e" stroke="#60a5fa" stroke-width="2" filter="url(#glow)" />
      <text x="155" y="7" font-family="'Fira Code', monospace" font-weight="bold" font-size="20" fill="#e2e8f0" text-anchor="middle">🐍 Python</text>
    </g>
  </g>

  <!-- DSA badge / icon (bottom right) -->
  <g transform="translate(1180, 340)" opacity="0.8">
    <rect x="0" y="0" width="36" height="36" rx="10" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <text x="18" y="24" font-family="monospace" font-weight="bold" font-size="16" fill="#b8d4ff" text-anchor="middle">DSA</text>
  </g>
</svg>
